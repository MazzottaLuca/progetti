<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="appBg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4a9a20"/>
      <stop offset="100%" stop-color="#0a3008"/>
    </radialGradient>
    <radialGradient id="islandGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6acc40"/>
      <stop offset="100%" stop-color="#2a7010"/>
    </radialGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background (rounded square - Android adaptive icon style) -->
  <rect width="512" height="512" rx="110" fill="url(#appBg)"/>

  <!-- Sky background circles (atmosphere) -->
  <circle cx="256" cy="180" r="170" fill="#1a6010" opacity="0.4"/>
  <circle cx="256" cy="180" r="130" fill="#2a7020" opacity="0.3"/>

  <!-- Sun -->
  <circle cx="390" cy="110" r="45" fill="#ffe060" opacity="0.7" filter="url(#iconGlow)"/>
  <circle cx="390" cy="110" r="32" fill="#fff090" opacity="0.9"/>

  <!-- Ocean (bottom half) -->
  <ellipse cx="256" cy="440" rx="280" ry="130" fill="#0a6090" opacity="0.8"/>
  <rect x="0" y="360" width="512" height="152" fill="#0a5080"/>

  <!-- Wave lines -->
  <path d="M0 370 Q64 358 128 370 Q192 382 256 370 Q320 358 384 370 Q448 382 512 370" fill="none" stroke="#1a80b0" stroke-width="4" opacity="0.6"/>
  <path d="M0 395 Q64 383 128 395 Q192 407 256 395 Q320 383 384 395 Q448 407 512 395" fill="none" stroke="#1a80b0" stroke-width="3" opacity="0.5"/>

  <!-- Island -->
  <ellipse cx="256" cy="330" rx="190" ry="65" fill="#1a5010"/>
  <ellipse cx="256" cy="318" rx="184" ry="58" fill="url(#islandGrad)"/>

  <!-- Big tree (center hero) -->
  <rect x="240" y="210" width="32" height="110" rx="10" fill="#5a3a15"/>
  <!-- Tree foliage layers -->
  <ellipse cx="256" cy="188" rx="60" ry="52" fill="#1a6010"/>
  <ellipse cx="228" cy="205" rx="42" ry="36" fill="#228018"/>
  <ellipse cx="284" cy="202" rx="38" ry="33" fill="#1a6010"/>
  <ellipse cx="256" cy="172" rx="50" ry="44" fill="#2a8020"/>
  <ellipse cx="256" cy="155" rx="38" ry="36" fill="#3a9830"/>
  <!-- Tree highlight -->
  <ellipse cx="240" cy="148" rx="24" ry="18" fill="#60cc40" opacity="0.4"/>

  <!-- Tree fruits -->
  <circle cx="232" cy="178" r="9" fill="#e03030"/>
  <circle cx="232" cy="178" r="7" fill="#f04040"/>
  <circle cx="278" cy="172" r="8" fill="#e03030"/>
  <circle cx="278" cy="172" r="6" fill="#f04040"/>
  <circle cx="256" cy="190" r="8" fill="#e03030"/>
  <circle cx="256" cy="190" r="6" fill="#f04040"/>

  <!-- Side small trees -->
  <rect x="120" y="264" width="18" height="58" rx="5" fill="#5a3a15"/>
  <ellipse cx="129" cy="248" rx="32" ry="28" fill="#228018"/>
  <ellipse cx="129" cy="235" rx="24" ry="22" fill="#2a9020"/>

  <rect x="370" y="270" width="16" height="52" rx="5" fill="#5a3a15"/>
  <ellipse cx="378" cy="256" rx="28" ry="24" fill="#228018"/>
  <ellipse cx="378" cy="244" rx="22" ry="20" fill="#2a9020"/>

  <!-- Ground flowers -->
  <circle cx="195" cy="314" r="7" fill="#f0d020"/>
  <circle cx="195" cy="314" r="4" fill="#c08010"/>
  <circle cx="230" cy="320" r="6" fill="#e04060"/>
  <circle cx="310" cy="316" r="6" fill="#e04060"/>
  <circle cx="320" cy="322" r="5" fill="#f0d020"/>
  <circle cx="180" cy="322" r="5" fill="white"/>

  <!-- Clouds (white fluffy) -->
  <g opacity="0.85">
    <ellipse cx="100" cy="100" rx="65" ry="28" fill="white" opacity="0.8"/>
    <ellipse cx="118" cy="84" rx="40" ry="26" fill="white" opacity="0.8"/>
    <ellipse cx="78" cy="92" rx="32" ry="20" fill="white" opacity="0.8"/>
  </g>
  <g opacity="0.75">
    <ellipse cx="390" cy="145" rx="50" ry="22" fill="white" opacity="0.8"/>
    <ellipse cx="405" cy="133" rx="30" ry="20" fill="white" opacity="0.8"/>
  </g>

  <!-- App name subtle (bottom) -->
  <!-- Simple decorative leaf border bottom -->
  <g opacity="0.3" transform="translate(180,470)">
    <path d="M0,0 C8,-6 14,0 10,10 C7,18 2,20 0,22" fill="#80e040"/>
    <path d="M20,2 C28,-4 34,2 30,12 C27,20 22,22 20,24" fill="#80e040"/>
    <path d="M-20,2 C-28,-4 -34,2 -30,12 C-27,20 -22,22 -20,24" fill="#80e040"/>
  </g>
</svg>

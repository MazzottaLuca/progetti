<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4010"/>
      <stop offset="100%" stop-color="#0a2808"/>
    </linearGradient>
    <radialGradient id="headerShine" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3a8020" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a4010" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Main header bar -->
  <rect width="360" height="80" fill="url(#headerGrad)"/>
  <rect width="360" height="80" fill="url(#headerShine)"/>

  <!-- Bottom edge highlight -->
  <rect x="0" y="77" width="360" height="3" fill="#50a030" opacity="0.6"/>

  <!-- Decorative leaf pattern left -->
  <g opacity="0.2">
    <path d="M-5,20 C10,10 25,18 20,35 C16,48 5,52 -5,50" fill="#70d040"/>
    <path d="M8,35 C15,25 28,30 25,45" fill="#70d040"/>
  </g>

  <!-- Decorative leaf pattern right -->
  <g opacity="0.2" transform="translate(360,0) scale(-1,1)">
    <path d="M-5,20 C10,10 25,18 20,35 C16,48 5,52 -5,50" fill="#70d040"/>
    <path d="M8,35 C15,25 28,30 25,45" fill="#70d040"/>
  </g>

  <!-- Subtle grid/texture -->
  <line x1="0" y1="40" x2="360" y2="40" stroke="#3a7020" stroke-width="0.5" opacity="0.3"/>
</svg>

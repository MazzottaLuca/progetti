<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="btnGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#80e040"/>
      <stop offset="50%" stop-color="#40b020"/>
      <stop offset="100%" stop-color="#1a7010"/>
    </radialGradient>
    <radialGradient id="btnGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0ff60" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#40b020" stop-opacity="0"/>
    </radialGradient>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="90" fill="url(#btnGlow)"/>

  <!-- Button outer ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#40b020" stroke-width="3" opacity="0.4"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#70d040" stroke-width="1.5" opacity="0.3"/>

  <!-- Main button circle -->
  <circle cx="100" cy="100" r="78" fill="url(#btnGrad)" filter="url(#btnShadow)"/>

  <!-- Button inner highlight (top shine) -->
  <ellipse cx="85" cy="70" rx="40" ry="25" fill="white" opacity="0.15"/>

  <!-- Large leaf shape (main icon) -->
  <g transform="translate(100,100)">
    <!-- Leaf body -->
    <path d="M0,-52 C30,-40 48,-10 40,20 C32,48 10,58 0,60 C-10,58 -32,48 -40,20 C-48,-10 -30,-40 0,-52 Z"
          fill="#c8f888" opacity="0.9"/>
    <!-- Leaf inner lighter -->
    <path d="M0,-42 C22,-32 36,-8 30,16 C22,38 8,46 0,48"
          fill="none" stroke="#e8ffc0" stroke-width="2" opacity="0.5"/>

    <!-- Leaf midrib -->
    <line x1="0" y1="-50" x2="0" y2="58" stroke="#2a8010" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Leaf veins left -->
    <line x1="0" y1="-20" x2="-22" y2="-8" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-28" y2="8" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="18" x2="-26" y2="24" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="34" x2="-18" y2="40" stroke="#2a8010" stroke-width="1" opacity="0.5"/>

    <!-- Leaf veins right -->
    <line x1="0" y1="-20" x2="22" y2="-8" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="28" y2="8" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="18" x2="26" y2="24" stroke="#2a8010" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="34" x2="18" y2="40" stroke="#2a8010" stroke-width="1" opacity="0.5"/>

    <!-- Sparkle dots on leaf -->
    <circle cx="-15" cy="-5" r="2.5" fill="white" opacity="0.5"/>
    <circle cx="18" cy="10" r="2" fill="white" opacity="0.4"/>
    <circle cx="-8" cy="25" r="2" fill="white" opacity="0.45"/>
  </g>

  <!-- Tap hint sparkles (corner decorations) -->
  <g opacity="0.7">
    <!-- Top right sparkle -->
    <g transform="translate(155,48)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#ffe060" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#ffe060" stroke-width="2" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#ffe060" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#ffe060" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Bottom left smaller sparkle -->
    <g transform="translate(44,150)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#a0ff60" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#a0ff60" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Top left tiny -->
    <g transform="translate(56,48)">
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#60e8ff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#60e8ff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>

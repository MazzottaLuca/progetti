<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="coinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a0e060"/>
      <stop offset="60%" stop-color="#50a020"/>
      <stop offset="100%" stop-color="#206010"/>
    </radialGradient>
    <filter id="coinGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#40a01044"/>
    </filter>
  </defs>

  <!-- Coin shadow -->
  <ellipse cx="33" cy="58" rx="22" ry="4" fill="#00000030"/>

  <!-- Coin body -->
  <circle cx="32" cy="32" r="26" fill="#206010" filter="url(#coinGlow)"/>
  <circle cx="32" cy="32" r="24" fill="url(#coinGrad)"/>

  <!-- Coin rim detail -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#70c030" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner leaf N symbol -->
  <!-- Leaf shape -->
  <path d="M32,14 C42,18 48,26 46,36 C44,44 38,50 32,52 C26,50 20,44 18,36 C16,26 22,18 32,14 Z"
        fill="#c8f870" opacity="0.9"/>
  <!-- Midrib -->
  <line x1="32" y1="15" x2="32" y2="50" stroke="#2a8010" stroke-width="2" stroke-linecap="round"/>
  <!-- Veins -->
  <line x1="32" y1="24" x2="22" y2="30" stroke="#2a8010" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="20" y2="36" stroke="#2a8010" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="24" x2="42" y2="30" stroke="#2a8010" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="44" y2="36" stroke="#2a8010" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="40" x2="24" y2="44" stroke="#2a8010" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="40" x2="40" y2="44" stroke="#2a8010" stroke-width="1" opacity="0.6"/>

  <!-- Shine highlight top -->
  <ellipse cx="26" cy="22" rx="9" ry="6" fill="white" opacity="0.2" transform="rotate(-20,26,22)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="40%" stop-color="#c0d8f0"/>
      <stop offset="100%" stop-color="#90b8e0"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0e8ff"/>
      <stop offset="100%" stop-color="#80b0d8"/>
    </linearGradient>
    <linearGradient id="floatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#70b0d8"/>
      <stop offset="100%" stop-color="#3070a0"/>
    </linearGradient>
    <radialGradient id="propGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#444"/>
    </radialGradient>
    <filter id="planeShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <g filter="url(#planeShadow)" transform="rotate(-15,64,64)">
    <!-- Main fuselage body -->
    <ellipse cx="64" cy="64" rx="48" ry="14" fill="url(#bodyGrad)"/>
    <!-- Fuselage detail line -->
    <ellipse cx="64" cy="61" rx="45" ry="6" fill="white" opacity="0.3"/>

    <!-- Nose (front) -->
    <ellipse cx="108" cy="64" rx="12" ry="10" fill="#c0d8f0"/>
    <!-- Nose cone -->
    <ellipse cx="116" cy="64" rx="6" ry="6" fill="#90b8e0"/>

    <!-- Tail -->
    <ellipse cx="20" cy="64" rx="10" ry="8" fill="#90b8e0"/>
    <!-- Vertical tail fin -->
    <path d="M22 58 L18 42 L30 54 Z" fill="#80a8d0"/>
    <path d="M22 58 L18 42 L30 54 Z" fill="none" stroke="#70a0c8" stroke-width="0.5"/>

    <!-- Horizontal tail stabilizers -->
    <ellipse cx="22" cy="64" rx="18" ry="6" fill="url(#wingGrad)" transform="rotate(-5,22,64)"/>

    <!-- Main wings (upper) -->
    <ellipse cx="72" cy="52" rx="55" ry="9" fill="url(#wingGrad)" transform="rotate(-3,72,52)"/>
    <!-- Wing underside detail -->
    <ellipse cx="72" cy="54" rx="50" ry="5" fill="white" opacity="0.2"/>

    <!-- Wing struts -->
    <rect x="58" y="56" width="4" height="12" rx="1" fill="#a0c0e0"/>
    <rect x="74" y="56" width="4" height="12" rx="1" fill="#a0c0e0"/>

    <!-- Floats / pontoons -->
    <ellipse cx="50" cy="84" rx="22" ry="6" fill="url(#floatGrad)"/>
    <ellipse cx="78" cy="84" rx="22" ry="6" fill="url(#floatGrad)"/>
    <!-- Float highlights -->
    <ellipse cx="50" cy="82" rx="18" ry="3" fill="white" opacity="0.2"/>
    <ellipse cx="78" cy="82" rx="18" ry="3" fill="white" opacity="0.2"/>

    <!-- Float struts -->
    <line x1="50" y1="72" x2="50" y2="79" stroke="#80a8c0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="78" y1="72" x2="78" y2="79" stroke="#80a8c0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="72" x2="73" y2="79" stroke="#80a8c0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="73" y1="72" x2="55" y2="79" stroke="#80a8c0" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Propeller hub -->
    <circle cx="118" cy="64" r="4" fill="url(#propGrad)"/>
    <!-- Propeller blades -->
    <ellipse cx="118" cy="52" rx="3" ry="10" fill="#666" opacity="0.8"/>
    <ellipse cx="118" cy="76" rx="3" ry="10" fill="#666" opacity="0.8"/>
    <ellipse cx="106" cy="64" rx="10" ry="3" fill="#666" opacity="0.7"/>
    <ellipse cx="130" cy="64" rx="10" ry="3" fill="#666" opacity="0.7"/>

    <!-- Cockpit window -->
    <ellipse cx="95" cy="57" rx="10" ry="7" fill="#a0d0f8"/>
    <ellipse cx="95" cy="55" rx="7" ry="4" fill="white" opacity="0.4"/>

    <!-- Green eco symbol on tail -->
    <circle cx="26" cy="64" r="7" fill="#40a840" opacity="0.8"/>
    <text x="26" y="68" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif">♻</text>
  </g>

  <!-- Water splash below floats -->
  <g transform="rotate(-15,64,64)">
    <path d="M28 92 Q35 88 42 92 Q49 96 56 92" fill="none" stroke="#60b0e0" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <path d="M72 92 Q79 88 86 92 Q93 96 100 92" fill="none" stroke="#60b0e0" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <!-- Spray dots -->
    <circle cx="34" cy="89" r="2" fill="#a0d8f8" opacity="0.5"/>
    <circle cx="85" cy="89" r="2" fill="#a0d8f8" opacity="0.5"/>
    <circle cx="94" cy="91" r="1.5" fill="#a0d8f8" opacity="0.4"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#a0b8d0"/>
    </linearGradient>
    <linearGradient id="mast" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <filter id="windShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <g filter="url(#windShadow)">
    <!-- Tower / mast -->
    <polygon points="60,52 68,52 72,120 56,120" fill="url(#mast)" rx="3"/>
    <!-- Tower base -->
    <ellipse cx="64" cy="120" rx="18" ry="5" fill="#888"/>
    <ellipse cx="64" cy="119" rx="16" ry="4" fill="#bbb"/>

    <!-- Nacelle (hub housing) -->
    <ellipse cx="64" cy="50" rx="12" ry="8" fill="#d0d8e0"/>
    <ellipse cx="64" cy="48" rx="10" ry="5" fill="white" opacity="0.3"/>

    <!-- Hub center -->
    <circle cx="64" cy="50" r="6" fill="#b0b8c8"/>
    <circle cx="64" cy="50" r="4" fill="#c8d0e0"/>
    <circle cx="64" cy="50" r="2" fill="#888"/>

    <!-- Blade 1 (up-left) -->
    <g transform="rotate(-30,64,50)">
      <ellipse cx="64" cy="22" rx="7" ry="28" fill="url(#bladeGrad)" rx="5"/>
      <ellipse cx="63" cy="20" rx="4" ry="20" fill="white" opacity="0.2"/>
    </g>

    <!-- Blade 2 (down-right) -->
    <g transform="rotate(90,64,50)">
      <ellipse cx="64" cy="22" rx="7" ry="28" fill="url(#bladeGrad)"/>
      <ellipse cx="63" cy="20" rx="4" ry="20" fill="white" opacity="0.2"/>
    </g>

    <!-- Blade 3 (down-left) -->
    <g transform="rotate(210,64,50)">
      <ellipse cx="64" cy="22" rx="7" ry="28" fill="url(#bladeGrad)"/>
      <ellipse cx="63" cy="20" rx="4" ry="20" fill="white" opacity="0.2"/>
    </g>
  </g>

  <!-- Wind lines -->
  <g stroke="#60c0f0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M8 30 Q18 26 28 30"/>
    <path d="M8 42 Q22 38 36 42"/>
    <path d="M10 54 Q20 50 30 54"/>
  </g>
  <g stroke="#60c0f0" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.35">
    <path d="M4 38 Q14 34 24 38"/>
    <path d="M6 60 Q16 56 26 60"/>
  </g>
</svg>

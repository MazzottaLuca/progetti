<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 50" width="80" height="50">
  <defs>
    <filter id="popGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#40c01088"/>
    </filter>
  </defs>

  <!-- Plus sign -->
  <text x="8" y="35" font-family="'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="28" font-weight="900" fill="#20a010" filter="url(#popGlow)"
        stroke="#ffffff" stroke-width="3" paint-order="stroke">+1</text>

  <!-- Small leaf beside it -->
  <g transform="translate(58,20)">
    <path d="M0,-10 C7,-6 10,0 8,8 C6,14 2,16 0,17 C-2,16 -6,14 -8,8 C-10,0 -7,-6 0,-10 Z"
          fill="#60d030" filter="url(#popGlow)"/>
    <line x1="0" y1="-9" x2="0" y2="16" stroke="#1a7010" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>

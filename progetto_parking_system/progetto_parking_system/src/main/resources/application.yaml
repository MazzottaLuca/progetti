spring:
  application:
    name: progetto_parking_system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/parking_system_db?createDatabaseIfNotExist=true&serverTimezone=Europe/Rome}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
server:
  port: 8080

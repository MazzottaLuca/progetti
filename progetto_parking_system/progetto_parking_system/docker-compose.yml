services:
  db:
    image: mysql:8.0
    container_name: parking_system_db
    restart: always
    environment:
      MYSQL_DATABASE: parking_system_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
      TZ: Europe/Rome
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - parking-network

  app:
    build: .
    container_name: parking_system_app
    restart: always
    depends_on:
      - db
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/parking_system_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Europe/Rome
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=user_password
      - TZ=Europe/Rome
    networks:
      - parking-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: parking_system_phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    networks:
      - parking-network

networks:
  parking-network:
    driver: bridge

volumes:
  db_data:

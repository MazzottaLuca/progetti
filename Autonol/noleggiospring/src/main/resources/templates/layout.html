<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AutoNol - Il tuo servizio di noleggio auto premium. Ampia flotta di veicoli per ogni esigenza.">
    <title th:text="${pageTitle != null ? pageTitle + ' | AutoNol' : 'AutoNol — Noleggio Auto Premium'}">AutoNol</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
    <div class="page-wrapper">
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand">
                    <span class="brand-icon">🚗</span>
                    AutoNol
                </a>
                <button class="navbar-toggle" onclick="document.querySelector('.navbar-nav').classList.toggle('show')">☰</button>
                <ul class="navbar-nav" id="navbarNav">
                    <li><a th:href="@{/}" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}"><span class="nav-icon">🏠</span> Home</a></li>
                    <li><a th:href="@{/auto}" th:classappend="${#httpServletRequest.requestURI.startsWith('/auto') ? 'active' : ''}"><span class="nav-icon">🚘</span> Auto</a></li>
                    <li><a th:href="@{/clienti}" th:classappend="${#httpServletRequest.requestURI.startsWith('/clienti') ? 'active' : ''}"><span class="nav-icon">👥</span> Clienti</a></li>
                    <li><a th:href="@{/noleggi}" th:classappend="${#httpServletRequest.requestURI.startsWith('/noleggi') ? 'active' : ''}"><span class="nav-icon">📋</span> Noleggi</a></li>
                </ul>
            </div>
        </nav>

        <!-- CONTENUTO PRINCIPALE -->
        <main class="main-content">
            <div class="container">
                <!-- Messaggi flash -->
                <div th:if="${messaggio}" class="alert alert-success fade-in">
                    <span>✅</span>
                    <span th:text="${messaggio}"></span>
                </div>
                <div th:if="${errore}" class="alert alert-danger fade-in">
                    <span>❌</span>
                    <span th:text="${errore}"></span>
                </div>

                <!-- Contenuto della pagina -->
                <div layout:fragment="content"></div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <span class="footer-brand">🚗 AutoNol</span>
                    <span class="footer-text">© 2024 AutoNol — Noleggio Auto Premium. Tutti i diritti riservati.</span>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>

spring.application.name=noleggiospring

# ============================================
# CONNESSIONE DATABASE MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/noleggio_auto?useSSL=false&serverTimezone=Europe/Rome&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Thymeleaf
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================
# Server
# ============================================
server.port=#metti la server port

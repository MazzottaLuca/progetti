<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nuovo Ticket</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Crea un nuovo ticket</h1>

        <form id="newTicketForm">
            <input type="text" id="titolo" placeholder="Titolo" required>
            <textarea id="descrizione" placeholder="Descrizione" required></textarea>
            <button type="submit">Crea Ticket</button>
        </form>

        <button id="goBack">Torna ai Ticket</button>
    </div>

    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

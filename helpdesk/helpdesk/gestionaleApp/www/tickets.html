<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Lista Ticket</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>I tuoi Ticket</h1>

      <!-- IL BOTTONE DEVE AVERE QUESTO ID -->
      <button id="newTicketBtn">Nuovo Ticket</button>
      <!-- BOTTONE AGGIORNA PAGINA -->
      <button id="refreshBtn">Aggiorna Pagina</button>
      <ul id="ticketList"></ul>
    </div>

    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
     <!-- SCRIPT DIRETTAMENTE NELL'HTML -->
    <script>
      // Aspettiamo che il DOM sia pronto
      document.addEventListener('DOMContentLoaded', function() {
        const refreshBtn = document.getElementById('refreshBtn');

        // Al click ricarichiamo la pagina
        refreshBtn.addEventListener('click', function() {
          location.reload();
        });
      });
    </script>
  </body>
</html>

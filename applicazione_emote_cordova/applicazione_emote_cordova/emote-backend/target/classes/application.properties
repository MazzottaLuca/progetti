# ============================================================
#  DATABASE
# ============================================================
spring.datasource.url=jdbc:mariadb://localhost:3306/piattaforma_emote?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  SERVER
# ============================================================
server.port= 
#metti la server port
# ============================================================
#  JWT
# ============================================================
# Cambia questa stringa con una tua chiave segreta lunga almeno 256 bit
jwt.secret=
jwt.expiration=

# ============================================================
#  HUGGING FACE
# ============================================================
# La chiave API HuggingFace sta SOLO qui nel backend — Cordova non la vede mai
huggingface.api.key=
huggingface.api.url=
huggingface.model=

# ============================================================
#  CORS (permette richieste dall'app Cordova in locale)
# ============================================================
cors.allowed-origins=*
